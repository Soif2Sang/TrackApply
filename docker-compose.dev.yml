services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-TrackApply}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL}
        CORS_ORIGIN: ${CORS_ORIGIN}
        DATABASE_URL: ${DATABASE_URL}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
        GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
        GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
        GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
        GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
        GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
        PUBSUB_VERIFICATION_TOKEN: ${PUBSUB_VERIFICATION_TOKEN}
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
        LABEL_RECRUITMENT_ACK: ${LABEL_RECRUITMENT_ACK}
        LABEL_NEXT_STEP: ${LABEL_NEXT_STEP}
        LABEL_DISAPPROVAL: ${LABEL_DISAPPROVAL}
        LABEL_LOW_CONFIDENCE: ${LABEL_LOW_CONFIDENCE}
        EMAIL_SYNC_BATCH_SIZE: ${EMAIL_SYNC_BATCH_SIZE:-50}
        EMAIL_SYNC_MAX_AGE_DAYS: ${EMAIL_SYNC_MAX_AGE_DAYS:-90}
        EMAIL_SYNC_PAGE_SIZE: ${EMAIL_SYNC_PAGE_SIZE:-100}
        EMAIL_SYNC_MAX_TOTAL: ${EMAIL_SYNC_MAX_TOTAL:-0}
        PROCESS_EMAIL_CONCURRENCY: ${PROCESS_EMAIL_CONCURRENCY:-2}
        ANALYZE_CONTENT_CONCURRENCY: ${ANALYZE_CONTENT_CONCURRENCY:-2}
        LABEL_EMAIL_CONCURRENCY: ${LABEL_EMAIL_CONCURRENCY:-4}
        ANALYZE_RETRY_LIMIT: ${ANALYZE_RETRY_LIMIT:-5}
        ANALYZE_RETRY_DELAY_SECONDS: ${ANALYZE_RETRY_DELAY_SECONDS:-30}
        PORT: ${PORT:-3002}
        NODE_ENV: ${NODE_ENV:-development}
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DATABASE_URL=${DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - PUBSUB_VERIFICATION_TOKEN=${PUBSUB_VERIFICATION_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - LABEL_RECRUITMENT_ACK=${LABEL_RECRUITMENT_ACK}
      - LABEL_NEXT_STEP=${LABEL_NEXT_STEP}
      - LABEL_DISAPPROVAL=${LABEL_DISAPPROVAL}
      - LABEL_LOW_CONFIDENCE=${LABEL_LOW_CONFIDENCE}
      - EMAIL_SYNC_BATCH_SIZE=${EMAIL_SYNC_BATCH_SIZE:-50}
      - EMAIL_SYNC_MAX_AGE_DAYS=${EMAIL_SYNC_MAX_AGE_DAYS:-90}
      - EMAIL_SYNC_PAGE_SIZE=${EMAIL_SYNC_PAGE_SIZE:-100}
      - EMAIL_SYNC_MAX_TOTAL=${EMAIL_SYNC_MAX_TOTAL:-0}
      - PROCESS_EMAIL_CONCURRENCY=${PROCESS_EMAIL_CONCURRENCY:-2}
      - ANALYZE_CONTENT_CONCURRENCY=${ANALYZE_CONTENT_CONCURRENCY:-2}
      - LABEL_EMAIL_CONCURRENCY=${LABEL_EMAIL_CONCURRENCY:-4}
      - ANALYZE_RETRY_LIMIT=${ANALYZE_RETRY_LIMIT:-5}
      - ANALYZE_RETRY_DELAY_SECONDS=${ANALYZE_RETRY_DELAY_SECONDS:-30}
      - PORT=${PORT:-3002}
      - NODE_ENV=${NODE_ENV:-development}
    ports:
      - "${PORT:-3002}:${PORT:-3002}"
    depends_on:
      postgres:
        condition: service_healthy

  drizzle-studio:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: ["npx", "drizzle-kit", "studio", "--host", "0.0.0.0", "--port", "4984"]
    ports:
      - "4984:4984"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_API_URL: ${VITE_API_URL}
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL}
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3003:81"


volumes:
  postgres_data:
