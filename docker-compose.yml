services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
      args:
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL}
        CORS_ORIGIN: ${CORS_ORIGIN}
        DATABASE_URL: ${DATABASE_URL}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
        GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
        GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
        GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
        GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
        GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
        PUBSUB_VERIFICATION_TOKEN: ${PUBSUB_VERIFICATION_TOKEN}
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
        LABEL_RECRUITMENT_ACK: ${LABEL_RECRUITMENT_ACK}
        LABEL_NEXT_STEP: ${LABEL_NEXT_STEP}
        LABEL_DISAPPROVAL: ${LABEL_DISAPPROVAL}
        LABEL_LOW_CONFIDENCE: ${LABEL_LOW_CONFIDENCE}
        EMAIL_SYNC_BATCH_SIZE: ${EMAIL_SYNC_BATCH_SIZE:-50}
        EMAIL_SYNC_MAX_AGE_DAYS: ${EMAIL_SYNC_MAX_AGE_DAYS:-90}
        EMAIL_SYNC_PAGE_SIZE: ${EMAIL_SYNC_PAGE_SIZE:-100}
        EMAIL_SYNC_MAX_TOTAL: ${EMAIL_SYNC_MAX_TOTAL:-0}
        PROCESS_EMAIL_CONCURRENCY: ${PROCESS_EMAIL_CONCURRENCY:-2}
        ANALYZE_CONTENT_CONCURRENCY: ${ANALYZE_CONTENT_CONCURRENCY:-2}
        LABEL_EMAIL_CONCURRENCY: ${LABEL_EMAIL_CONCURRENCY:-4}
        ANALYZE_RETRY_LIMIT: ${ANALYZE_RETRY_LIMIT:-5}
        ANALYZE_RETRY_DELAY_SECONDS: ${ANALYZE_RETRY_DELAY_SECONDS:-30}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY}
        PORT: ${PORT:-3002}
        NODE_ENV: ${NODE_ENV:-production}
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DATABASE_URL=${DATABASE_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - PUBSUB_VERIFICATION_TOKEN=${PUBSUB_VERIFICATION_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - LABEL_RECRUITMENT_ACK=${LABEL_RECRUITMENT_ACK}
      - LABEL_NEXT_STEP=${LABEL_NEXT_STEP}
      - LABEL_DISAPPROVAL=${LABEL_DISAPPROVAL}
      - LABEL_LOW_CONFIDENCE=${LABEL_LOW_CONFIDENCE}
      - EMAIL_SYNC_BATCH_SIZE=${EMAIL_SYNC_BATCH_SIZE:-50}
      - EMAIL_SYNC_MAX_AGE_DAYS=${EMAIL_SYNC_MAX_AGE_DAYS:-90}
      - EMAIL_SYNC_PAGE_SIZE=${EMAIL_SYNC_PAGE_SIZE:-100}
      - EMAIL_SYNC_MAX_TOTAL=${EMAIL_SYNC_MAX_TOTAL:-0}
      - PROCESS_EMAIL_CONCURRENCY=${PROCESS_EMAIL_CONCURRENCY:-2}
      - ANALYZE_CONTENT_CONCURRENCY=${ANALYZE_CONTENT_CONCURRENCY:-2}
      - LABEL_EMAIL_CONCURRENCY=${LABEL_EMAIL_CONCURRENCY:-4}
      - ANALYZE_RETRY_LIMIT=${ANALYZE_RETRY_LIMIT:-5}
      - ANALYZE_RETRY_DELAY_SECONDS=${ANALYZE_RETRY_DELAY_SECONDS:-30}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=${PORT:-3002}
      - NODE_ENV=${NODE_ENV:-production}
    expose:
      - ${PORT:-3002}
    networks:
      - dokploy-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_API_URL: ${VITE_API_URL}
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL}
      - VITE_API_URL=${VITE_API_URL}
    expose:
      - 81
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
